name: Auto-merge Claude PRs

# Automatically merges pull requests from claude/* branches into main once
# they are marked ready for review, then requests a GitHub Pages rebuild
# (pushes made with GITHUB_TOKEN do not trigger the automatic Pages build).
#
# Safety gates: same-repo branches only (never forks), claude/* branches
# only, and never drafts — so work-in-progress stays reviewable until the
# PR is explicitly marked ready.

on:
  pull_request:
    types: [opened, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write
  pages: write

jobs:
  merge:
    if: >-
      ${{ !github.event.pull_request.draft &&
          github.event.pull_request.head.repo.full_name == github.repository &&
          startsWith(github.event.pull_request.head.ref, 'claude/') }}
    runs-on: ubuntu-latest
    steps:
      - name: Merge the pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh pr merge "${{ github.event.pull_request.number }}"
          --repo "${{ github.repository }}" --merge

      - name: Request a GitHub Pages rebuild of main
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api "repos/${{ github.repository }}/pages/builds" -X POST || true
